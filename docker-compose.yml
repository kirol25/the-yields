services:
  backend:
    build: ./backend
    volumes:
      - ./data:/data
    environment:
      STORAGE_BACKEND: local
      CORS_ORIGINS: http://localhost
    ports:
      - "127.0.0.1:8000:8000"
    labels:
      app: "the-yield"
      service: "backend"
  ui:
    build:
      context: ./ui
    env_file:
      - ./ui/.env
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    labels:
      app: "the-yield"
      service: "ui"
