services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: the_yields
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      app: "the-yields"
      service: "db"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/data
    environment:
      CORS_ORIGINS: http://localhost
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/the_yields
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    labels:
      app: "the-yields"
      service: "backend"

  ui:
    build:
      context: ./ui
    env_file:
      - ./ui/.env
    ports:
      - "127.0.0.1:3000:8080"
    depends_on:
      - backend
    labels:
      app: "the-yields"
      service: "ui"

volumes:
  postgres_data:
