[alembic]
# Path to the alembic directory containing env.py
script_location = alembic

# Migration file naming: YYYYMMDD_<rev>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# The database URL is set programmatically in env.py from app settings.
# This placeholder keeps Alembic happy if the ini is read directly.
sqlalchemy.url =

[post_write_hooks]
# (none configured)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
