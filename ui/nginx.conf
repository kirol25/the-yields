# Rate limiting: 10 req/s per IP on /api/, burst of 20 allowed before returning 429.
# The shared memory zone (10m) is enough for ~160k unique IPs.
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # index.html — always revalidate so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # hashed assets — cache forever, they change with every build
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Nginx stub_status — only accessible from within the Docker network
    location /stub_status {
        stub_status;
        allow 172.16.0.0/12;
        deny all;
    }
}
