name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: "Create a release"
        type: boolean
        required: true
        default: false

# Cancel in-progress runs for the same branch/PR when a new commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal read-only permissions for all jobs
permissions:
  contents: read

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────
  test-ui:
    name: Test UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Placeholder values so Vite can build without real credentials
          VITE_API_BASE: http://localhost:8000
          VITE_COGNITO_CLIENT_ID: ci-placeholder
          VITE_REGISTRATION_ENABLED: "false"
          VITE_STRIPE_ENABLED: "false"

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Smoke test — app imports cleanly
        run: uv run python -c "from app.main import app; print('app loaded OK')"
        env:
          ENVIRONMENT: prod

      - name: Health endpoint check
        run: |
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          curl --fail --silent http://127.0.0.1:8000/monitoring/health
        env:
          ENVIRONMENT: prod

      - name: Run tests
        run: uv run pytest tests/ -v --junit-xml=pytest-report.xml

      - name: Publish test report
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: pytest-report
          path: backend/pytest-report.xml

  # ── Gate ─────────────────────────────────────────────────────────────────────
  healthy:
    name: Healthy
    needs: [test-ui, test-backend]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed ✓"

  # ── Tag — read each version independently and create separate git tags ──────
  tag-ui-release:
    name: Tag UI Release
    needs: [healthy]
    if: github.event_name == 'workflow_dispatch' && inputs.release == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read UI version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        working-directory: ui

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "ui-v${{ steps.version.outputs.value }}"
          git push origin "ui-v${{ steps.version.outputs.value }}"

  tag-backend-release:
    name: Tag Backend Release
    needs: [healthy]
    if: github.event_name == 'workflow_dispatch' && inputs.release == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read backend version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "value=$VERSION" >> $GITHUB_OUTPUT
        working-directory: backend

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "backend-v${{ steps.version.outputs.value }}"
          git push origin "backend-v${{ steps.version.outputs.value }}"

  # ── Publish — each image uses its own version ────────────────────────────
  publish-ui:
    name: Publish UI Image
    needs: [tag-ui-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ui
          push: true
          cache-from: type=gha,scope=ui
          cache-to: type=gha,scope=ui,mode=max
          build-args: |
            VITE_API_BASE=${{ secrets.VITE_API_BASE }}
            VITE_COGNITO_CLIENT_ID=${{ secrets.VITE_COGNITO_CLIENT_ID }}
            VITE_REGISTRATION_ENABLED=${{ vars.VITE_REGISTRATION_ENABLED }}
            VITE_STRIPE_ENABLED=${{ vars.VITE_STRIPE_ENABLED }}
          tags: ghcr.io/${{ github.repository_owner }}/the-yields-ui:${{ needs.tag-ui-release.outputs.version }}

  publish-backend:
    name: Publish Backend Image
    needs: [tag-backend-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: backend
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          tags: ghcr.io/${{ github.repository_owner }}/the-yields-backend:${{ needs.tag-backend-release.outputs.version }}
