version: 2

updates:
  # Frontend — npm (ui/)
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    assignees:
      - "kirol25"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"

  # Backend — uv / pyproject.toml (backend/)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    assignees:
      - "kirol25"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Terraform (infrastructure/terraform/services/)
  - package-ecosystem: "terraform"
    directory: "/infrastructure/terraform/services"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    assignees:
      - "kirol25"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    assignees:
      - "kirol25"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
