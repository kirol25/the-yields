---
# playbooks/deploy.yml
# Deploy the-yield to an already-provisioned server.
# Run this every time you push an update.
#
# Prerequisites: server-mgmt provision.yml has been run at least once.
#
# Usage:
#   ansible-playbook playbooks/deploy.yml

- name: Deploy the-yield
  hosts: all
  become: true

  roles:
    - app     # syncs code and restarts Docker containers
    - nginx   # deploys/updates the app's Nginx vhost config
    - certbot # obtains SSL certificate (skipped if cert already exists)
