---
# playbooks/setup.yml
# First-time app setup on an already-provisioned server.
# Run this once after running server-mgmt/playbooks/provision.yml.
#
# Usage:
#   ansible-playbook playbooks/setup.yml
#
# What it does:
#   1. app   — syncs code and starts Docker containers
#   2. nginx — registers the app's vhost config and reloads Nginx

- name: First-time setup for the-yield
  hosts: all
  become: true

  roles:
    - app
    - nginx
