---
# playbooks/setup.yml
# Full server provisioning — run this ONCE on a fresh server.
#
# Usage:
#   ansible-playbook playbooks/setup.yml
#
# What it does (in order):
#   1. common  — updates packages, creates app user, configures firewall
#   2. docker  — installs Docker CE + Compose plugin
#   3. nginx   — installs and configures Nginx (SSL termination + static files)
#   4. app     — syncs code and runs docker compose
#   5. certbot — obtains SSL certificate from Let's Encrypt

- name: Provision server
  hosts: all
  become: true

  roles:
    - common
    - docker
    - nginx
    - app
    - certbot
