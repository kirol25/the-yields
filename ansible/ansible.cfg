[defaults]
# Path to your inventory file
inventory = inventory/hosts.ini

# Tell Ansible where to find roles (relative to ansible.cfg)
roles_path = roles

# Tell Ansible where to find group variables (relative to ansible.cfg)
group_vars = group_vars

# The user Ansible will SSH into your server as (usually root or a sudo user)
remote_user = root

# Path to your private SSH key
private_key_file = ~/.ssh/id_ed25519

# Disables host key checking so you don't get prompted on first connect
host_key_checking = False

# Makes Ansible output more readable
stdout_callback = yaml
