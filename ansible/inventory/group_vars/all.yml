# ── App identity ──────────────────────────────────────────────────────────────
domain: "the-yield.app"

# ── App user (must match server-mgmt/inventory/group_vars/all.yml) ────────────
app_user: "yield"
app_group: "yield"

# ── Paths ─────────────────────────────────────────────────────────────────────
app_dir: "/home/{{ app_user }}/the-yield"

# ── Backend ───────────────────────────────────────────────────────────────────
backend_port: 8000
