---
- name: Update apt cache and upgrade packages
  apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 3600

- name: Install essential packages
  apt:
    name:
      - curl
      - wget
      - git
      - htop
      - net-tools
      - unattended-upgrades
      - apt-listchanges
      - fail2ban
      - ufw
      - python3
      - python3-pip
      - python3-venv
      - unzip
    state: present

- name: Set system timezone
  timezone:
    name: UTC
  notify: restart system services
