---
# Creates the app user and gives it sudo access.
# This runs BEFORE ssh.yml so the user exists before root login is restricted.

- name: Create app user
  user:
    name: "{{ app_user }}"
    shell: /bin/bash
    create_home: yes
    state: present

- name: Add app user to sudo group
  user:
    name: "{{ app_user }}"
    groups: sudo
    append: yes

- name: Create .ssh directory for app user
  file:
    path: "/home/{{ app_user }}/.ssh"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0700"

- name: Copy root authorized_keys to app user
  # This ensures you can SSH in as the app user with the same key you used for root
  copy:
    src: /root/.ssh/authorized_keys
    dest: "/home/{{ app_user }}/.ssh/authorized_keys"
    remote_src: yes
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0600"
