---
- name: restart system services
  service:
    name: cron
    state: restarted

- name: restart sshd
  systemd:
    name: ssh
    state: restarted

- name: restart fail2ban
  systemd:
    name: fail2ban
    state: restarted

- name: restart rsyslog
  systemd:
    name: rsyslog
    state: restarted
