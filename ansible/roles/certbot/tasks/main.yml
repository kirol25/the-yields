---
# certbot/tasks/main.yml
# Installs certbot and obtains a free SSL certificate from Let's Encrypt.
# Your domain must already be pointing to the server's IP before running this.

- name: Install certbot and Nginx plugin
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present

- name: Obtain SSL certificate
  command: >
    certbot --nginx
    -d {{ domain }}
    -d www.{{ domain }}
    --non-interactive
    --agree-tos
    --email {{ certbot_email }}
    --redirect
  args:
    creates: /etc/letsencrypt/live/{{ domain }}/fullchain.pem

# certbot auto-installs a cron job / systemd timer for renewal — nothing else needed
