version: '3'
vars:
  BACKEND_PORT: 8000

tasks:
  # –––– Development ––––––––––––––––––––––––––––––––––––––––––
  ui:
    desc: Start the Vite dev server on :5173
    cmd: |
      cd ui
      npm run dev

  api:
    desc: Start the FastAPI server
    env:
      PYTHONPATH: backend
    cmd: |
      cd backend
      uv run uvicorn app.main:app --reload --host 0.0.0.0 --port {{.BACKEND_PORT}}

  dev:
    desc: Start both ui and api concurrently
    deps: [ui, api]

  # –––– Build ––––––––––––––––––––––––––––––––––––––––––
  build:ui:
    desc: Build the UI for production
    cmd: |
      cd ui
      npm run build

  build:api:
    desc: Build the backend Docker image
    cmd: |
      docker build -t the-yields-api ./backend

  build:
    desc: Build both UI and backend
    deps: [build:ui, build:api]

  # –––– Test ––––––––––––––––––––––––––––––––––––––––––
  test:
    desc: Run backend tests
    env:
      PYTHONPATH: backend
    cmd: |
      cd backend
      uv run pytest

  format:
    desc: Format code with Ruff and Prettier
    cmd: |
      pre-commit run --all-files
